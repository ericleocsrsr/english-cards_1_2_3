<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中英文核心單字-情境填空測驗系統</title>
    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --neutral-color: #34495e;
            --bg-color: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--neutral-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            padding: 15px;
        }

        header {
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .progress-bar {
            flex-grow: 1;
            background-color: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--success-color);
            width: 0%;
            transition: width 0.3s;
        }

        .reset-btn {
            padding: 4px 10px;
            font-size: 0.8rem;
            border: none;
            background: #bdc3c7;
            color: white;
            border-radius: 12px;
            cursor: pointer;
        }

        /* 題目卡片 */
        .quiz-card {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            padding: 20px;
            margin-bottom: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .question-box {
            font-size: 1.15rem;
            line-height: 1.5;
            font-weight: 500;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .blank-space {
            color: var(--primary-color);
            text-decoration: underline;
            font-weight: bold;
            padding: 0 4px;
        }

        /* 選項按鈕 */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .option-btn {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            text-align: left;
            border: 2px solid #ecf0f1;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #34495e;
            font-weight: 500;
        }

        .option-btn:active {
            background-color: #f1f2f6;
        }

        .option-btn.correct {
            background-color: #e8f8f5 !important;
            border-color: var(--success-color) !important;
            color: #117a65 !important;
        }

        .option-btn.wrong {
            background-color: #fdedec !important;
            border-color: var(--danger-color) !important;
            color: #943126 !important;
        }

        .option-btn.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        /* 解析區塊 */
        .explanation-box {
            background-color: #f4f6f7;
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            font-size: 0.95rem;
            line-height: 1.4;
            display: none;
        }

        .explanation-box.show {
            display: block;
        }

        .translation {
            color: #7f8c8d;
            margin-bottom: 8px;
            font-style: italic;
        }

        .analysis {
            color: #2c3e50;
            border-top: 1px dashed #ccc;
            padding-top: 8px;
        }

        /* 下一題操作區 */
        .next-container {
            width: 100%;
            max-width: 500px;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .next-container.show {
            display: flex;
        }

        .feedback-title {
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-again { background-color: #e67e22; }
        .btn-easy { background-color: var(--success-color); }
    </style>
</head>
<body>

    <header>
        <h1>📝 智慧英文填空選擇題</h1>
        <div class="progress-container">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <span id="statsText">0%</span>
            <button class="reset-btn" onclick="resetData()">重置</button>
        </div>
    </header>

    <div class="quiz-card">
        <div id="questionBox" class="question-box">載入中...</div>
        <div id="optionsContainer" class="options-container"></div>
        
        <div id="explanationBox" class="explanation-box">
            <div id="translationText" class="translation">中文翻譯</div>
            <div id="analysisText" class="analysis">核心解析</div>
        </div>
    </div>

    <div id="nextContainer" class="next-container">
        <div id="feedbackTitle" class="feedback-title">請評估此單字的熟練度以排入記憶曲線：</div>
        <div class="btn-row">
            <button id="btnAgain" class="btn btn-again" onclick="submitLevel(1)">❌ 答錯/再試一次</button>
            <button id="btnEasy" class="btn btn-easy" onclick="submitLevel(5)">✅ 輕鬆掌握</button>
        </div>
    </div>

    <script>
        // 核心題庫：高一至高二程度，每個單字配有 2 個填空情境句
        const quizDatabase = [
            {
                word: "dignity",
                sentence1: "The old king maintained his _______ even after he was forced to give up his throne.",
                options1: ["dignity", "poverty", "passenger", "leather"],
                trans1: "老國王即使在被迫放棄王位後，依然保持著他的尊嚴。",
                sentence2: "It is beneath your _______ to cheat in a high school examination.",
                options2: ["dignity", "authority", "partner", "fever"],
                trans2: "在高中考試中作弊是有損你尊嚴的。"
            },
            {
                word: "volunteer",
                sentence1: "Every summer, Jenny decides to _______ at the local animal shelter to help stray dogs.",
                options1: ["volunteer", "calculate", "devise", "assemble"],
                trans1: "每年夏天，珍妮都決定在當地的動物收容所當志工來幫助流浪狗。",
                sentence2: "The clinic is looking for a _______ to assist with administrative work on weekends.",
                options2: ["volunteer", "settler", "beggar", "host"],
                trans2: "這家診所正在尋找一名志工，以便在週末協助行政工作。"
            },
            {
                word: "leather",
                sentence1: "This premium jacket is made of genuine _______, making it both durable and expensive.",
                options1: ["leather", "poverty", "strategy", "permission"],
                trans1: "這件高級外套是由真皮製成的，因此既耐用又昂貴。",
                sentence2: "She bought a vintage _______ sofa that perfectly matches the classic style of her living room.",
                options2: ["leather", "domestic", "freezing", "suitable"],
                trans2: "她買了一款復古皮沙發，完美搭配她客廳的古典風格。"
            },
            {
                word: "exact",
                sentence1: "Can you give me the _______ time when the package will be delivered tomorrow?",
                options1: ["exact", "historical", "domestic", "similarly"],
                trans1: "你能告訴我明天包裹送達的確切時間嗎？",
                sentence2: "The scientists need _______ measurements to ensure the experiment succeeds.",
                options2: ["exact", "freezing", "unusual", "desperate"],
                trans2: "科學家們需要精確的測量數據以確保實驗成功。"
            },
            {
                word: "partner",
                sentence1: "Our tech firm has decided to _______ with a top college to develop advanced AI models.",
                options1: ["partner", "recover", "introduce", "calculate"],
                trans1: "我們的科技公司已決定與一所頂尖大學合作，開發先進的人工智慧模型。",
                sentence2: "You need to find a reliable business _______ if you want to open a restaurant.",
                options2: ["partner", "passenger", "settler", "beggar"],
                trans2: "如果你想開一家餐廳，你需要找到一個可靠的商業夥伴。"
            },
            {
                word: "assemble",
                sentence1: "The principal requested all students to _______ in the main gymnasium for the assembly.",
                options1: ["assemble", "devise", "recover", "diverge"],
                trans1: "校長要求所有學生在主體育館集合召開集會。",
                sentence2: "It took my brother nearly three hours to _______ the complex Lego spaceship.",
                options2: ["assemble", "increase", "project", "spread"],
                trans2: "我哥哥花了將近三個小時才組裝好那個複雜的樂高太空船。"
            },
            {
                word: "suitable",
                sentence1: "Jeans and T-shirts are not considered _______ attire for a formal job interview.",
                options1: ["suitable", "domestic", "exact", "magnificent"],
                trans1: "牛仔褲和T恤不被認為是正式求職面試的合適服裝。",
                sentence2: "The movie is rated PG, meaning it is _______ for teenagers but maybe not for young kids.",
                options2: ["suitable", "freezing", "historical", "desperate"],
                trans2: "這部電影被評為輔導級，意味著它適合青少年，但可能不適合幼童。"
            },
            {
                word: "permission",
                sentence1: "You cannot use the company's official logo without written _______ from the manager.",
                options1: ["permission", "authority", "dignity", "strategy"],
                trans1: "未經經理的書面許可，您不能使用公司的官方標誌。",
                sentence2: "The teacher gave Tim _______ to leave the classroom early because he felt sick.",
                options2: ["permission", "poverty", "partnership", "fever"],
                trans2: "老師准許提姆提早離開教室，因為他覺得身體不舒服。"
            },
            {
                word: "authority",
                sentence1: "Medical experts are considered the ultimate _______ on health-related matters.",
                options1: ["authority", "volunteer", "passenger", "settler"],
                trans1: "醫學專家被認為是健康相關事務的最終權威。",
                sentence2: "The local _______ decided to install more streetlights to improve night safety.",
                options2: ["authorities", "strategies", "partnerships", "differences"],
                trans2: "地方當局決定安裝更多路燈以提高夜間安全。"
            },
            {
                word: "poverty",
                sentence1: "The government launched a new project aimed at reducing child _______ in rural areas.",
                options1: ["poverty", "leather", "dignity", "permission"],
                trans1: "政府啟動了一項旨在減少農村地區兒童貧困的新計畫。",
                sentence2: "Growing up in extreme _______ taught the successful businessman the value of hard work.",
                options2: ["poverty", "authority", "strategy", "balance"],
                trans2: "在極度貧困中長大，讓這位成功的商人學到了努力工作的價值。"
            },
            {
                word: "historical",
                sentence1: "The museum contains many valuable _______ documents from the American Civil War.",
                options1: ["historical", "suitable", "domestic", "current"],
                trans1: "這家博物館藏有許多來自美國南北戰爭的珍貴歷史文獻。",
                sentence2: "We need to analyze this event from a _______ perspective to understand its impact.",
                options2: ["historical", "freezing", "exact", "positive"],
                trans2: "我們 need 從歷史的角度來分析這起事件，以了解其影響。"
            },
            {
                word: "recover",
                sentence1: "It took the young athlete almost six months to _______ fully from the knee surgery.",
                options1: ["recover", "devise", "calculate", "introduce"],
                trans1: "這位年輕的運動員花了將近六個月的時間才從膝蓋手術中完全復原。",
                sentence2: "The IT experts managed to _______ all the lost data from the damaged hard drive.",
                options2: ["recover", "assemble", "project", "spread"],
                trans2: "資訊專家成功從受損的硬碟中救回了所有遺失的數據。"
            },
            {
                word: "devise",
                sentence1: "The marketing team needs to _______ a creative strategy to attract teenage customers.",
                options1: ["devise", "calculate", "volunteer", "partner"],
                trans1: "行銷團隊需要策劃出一個有創意的策略來吸引青少年顧客。",
                sentence2: "Engineers are trying to _______ a safer method for disposing of industrial waste.",
                options2: ["devise", "assemble", "increase", "spread"],
                trans2: "工程師們正在努力想出一種更安全的方法來處理工業廢棄物。"
            },
            {
                word: "strategy",
                sentence1: "To pass the advanced exam, you need a smart study _______ rather than just memorizing facts.",
                options1: ["strategy", "permission", "leather", "poverty"],
                trans1: "要通過這項高級考試，你需要聰明的讀書策略，而不僅僅是死記硬背。",
                sentence2: "The company’s global growth _______ focused heavily on online advertising.",
                options2: ["strategy", "authority", "dignity", "passenger"],
                trans2: "該公司的全球成長策略非常注重網路廣告。"
            },
            {
                word: "calculate",
                sentence1: "Students are allowed to use a digital device to _______ the total surface area of the cone.",
                options1: ["calculate", "devise", "recover", "introduce"],
                trans1: "學生被允許使用數位裝置來計算圓錐體的總表面積。",
                selection2: "It is difficult to _______ the precise economic damage caused by the massive typhoon.",
                options2: ["calculate", "project", "increase", "balance"],
                trans2: "很難估計這場強烈颱風所造成的確切經濟損失。"
            },
            {
                word: "positive",
                sentence1: "Maintaining a _______ attitude can help you overcome high school academic stress.",
                options1: ["positive", "historical", "freezing", "desperate"],
                trans1: "保持積極的態度可以幫助你克服高中的學業壓力。",
                sentence2: "The new educational policy received highly _______ feedback from both parents and teachers.",
                options2: ["positive", "domestic", "suitable", "exact"],
                trans2: "這項新的教育政策獲得了家長和老師高度正面的回饋。"
            },
            {
                word: "increase",
                sentence1: "The restaurant hopes to _______ its sales by introducing a new online food ordering service.",
                options1: ["increase", "recover", "calculate", "devise"],
                trans1: "這家餐廳希望透過引進新的線上點餐服務來增加銷量。",
                sentence2: "There has been a steady _______ in the number of tourists visiting the historic town recently.",
                options2: ["increase", "poverty", "permission", "authority"],
                trans2: "最近造訪這座歷史名鎮的遊客人數出現了穩步增長。"
            },
            {
                word: "domestic",
                sentence1: "Flights from Taipei to Kaohsiung belong to _______ aviation routes rather than international ones.",
                options1: ["domestic", "historical", "positive", "suitable"],
                trans1: "台北飛往高雄的航班屬於國內航線，而非國際航線。",
                sentence2: "Cats and dogs are common _______ animals that have lived with humans for thousands of years.",
                options2: ["domestic", "exact", "freezing", "unusual"],
                trans2: "貓和狗是常見的馴養動物，已經與人類共同生活了數千年。"
            },
            {
                word: "desperate",
                sentence1: "After wandering in the desert for two days, the travelers were _______ for fresh water.",
                options1: ["desperate", "suitable", "positive", "domestic"],
                trans1: "在沙漠中徘徊兩天后，這些旅人迫切需要淡水。",
                sentence2: "The company made a _______ attempt to save its failing project by hiring an expert.",
                options2: ["desperate", "historical", "exact", "freezing"],
                trans2: "該公司透過雇用一名專家，做出了挽救其失敗專案的孤注一擲的嘗試。"
            },
            {
                word: "balance",
                sentence1: "It is crucial for senior high school students to maintain a healthy _______ between study and rest.",
                options1: ["balance", "strategy", "permission", "poverty"],
                trans1: "對於高中生來說，在學習和休息之間保持健康的平衡至關重要。",
                sentence2: "The gymnast managed to keep her _______ perfectly on the narrow wooden beam.",
                options2: ["balance", "dignity", "authority", "partner"]
                trans2: "體操運動員成功地在狹窄的木樑上完美保持了平衡。"
            }
        ];

        let userProgress = {};
        let currentIdx = -1;
        let selectedSentenceNum = 1; // 隨機抽 1 或 2，增加題目的豐富度
        let answeredCorrectly = false;

        function initQuiz() {
            const saved = localStorage.getItem('cloze_quiz_progress_v1');
            if (saved) {
                userProgress = JSON.parse(saved);
            } else {
                quizDatabase.forEach((item, index) => {
                    userProgress[index] = {
                        box: 1,          // 熟練度盒子 (1-5)
                        nextReview: 0,   // 時間戳
                        historyCount: 0
                    };
                });
                saveProgress();
            }
            pickNextQuestion();
        }

        function saveProgress() {
            localStorage.setItem('cloze_quiz_progress_v1', JSON.stringify(userProgress));
        }

        function pickNextQuestion() {
            const now = Date.now();
            let pool = [];

            // 1. 找出時間到的題目
            for (let idx in userProgress) {
                if (userProgress[idx].nextReview <= now) {
                    pool.push({ idx: parseInt(idx), ...userProgress[idx] });
                }
            }

            // 2. 如果都沒到時間，挑盒子等級最低的
            if (pool.length === 0) {
                let minBox = 6;
                for (let idx in userProgress) {
                    if (userProgress[idx].box < minBox) minBox = userProgress[idx].box;
                }
                for (let idx in userProgress) {
                    if (userProgress[idx].box === minBox) pool.push({ idx: parseInt(idx), ...userProgress[idx] });
                }
            }

            // 隨機選一個單字
            const chosen = pool[Math.floor(Math.random() * pool.length)];
            currentIdx = chosen.idx;
            // 隨機決定要考句1還是句2
            selectedSentenceNum = Math.random() < 0.5 ? 1 : 2;

            renderQuestion();
        }

        function renderQuestion() {
            const data = quizDatabase[currentIdx];
            const qBox = document.getElementById('questionBox');
            const optionsContainer = document.getElementById('optionsContainer');
            const expBox = document.getElementById('explanationBox');
            const nextContainer = document.getElementById('nextContainer');

            // 隱藏解析與下一題區塊
            expBox.classList.remove('show');
            nextContainer.classList.remove('show');

            // 取得對應句型的資料
            let sentenceText = selectedSentenceNum === 1 ? data.sentence1 : data.sentence2;
            let options = selectedSentenceNum === 1 ? data.options1 : data.options2;

            // 將底線轉化為網頁可讀格式
            qBox.innerHTML = sentenceText.replace("_______", "<span class='blank-space'>[  ?  ]</span>");

            // 清空舊選項並生成新選項
            optionsContainer.innerHTML = "";
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, data.word);
                optionsContainer.appendChild(btn);
            });

            updateProgressUi();
        }

        function checkAnswer(selectedBtn, chosenValue, correctWord) {
            const allBtns = document.querySelectorAll('.option-btn');
            const expBox = document.getElementById('explanationBox');
            const nextContainer = document.getElementById('nextContainer');
            const data = quizDatabase[currentIdx];

            // 鎖定所有選項不讓重複點選
            allBtns.forEach(btn => btn.classList.add('disabled'));

            if (chosenValue === correctWord) {
                selectedBtn.classList.add('correct');
                answeredCorrectly = true;
                document.getElementById('feedbackTitle').innerText = "🎉 答對了！請評估此單字熟練度：";
            } else {
                selectedBtn.classList.add('wrong');
                answeredCorrectly = false;
                document.getElementById('feedbackTitle').innerText = "❌ 答錯了！此字將被優先安排複習：";
                
                // 標示出正確答案
                allBtns.forEach(btn => {
                    if (btn.innerText === correctWord) btn.classList.add('correct');
                });
            }

            // 顯示中文翻譯與詳解
            document.getElementById('translationText').innerText = "💡 中文翻譯：\n" + (selectedSentenceNum === 1 ? data.trans1 : data.trans2);
            document.getElementById('analysisText').innerText = `🎯 本題核心字彙是【${data.word}】。請記住此情境與文法搭配。`;
            expBox.classList.add('show');
            nextContainer.classList.add('show');
        }

        function submitLevel(rating) {
            const prog = userProgress[currentIdx];
            const now = Date.now();
            let minutes = 1;

            // 如果答錯 (rating = 1) 或自我評估為不熟
            if (!answeredCorrectly || rating === 1) {
                prog.box = 1;
                minutes = 0.5; // 30秒後再次出現
            } else {
                // 答對且覺得簡單
                prog.box = Math.min(5, prog.box + 1);
                const intervals = [1, 20, 120, 1440, 5760]; // 複習級距：1分、20分、2小時、1天、4天
                minutes = intervals[prog.box - 1];
            }

            prog.nextReview = now + (minutes * 60 * 1000);
            saveProgress();
            pickNextQuestion();
        }

        function updateProgressUi() {
            let total = quizDatabase.length;
            let mastered = 0;
            for (let idx in userProgress) {
                if (userProgress[idx].box >= 4) mastered++;
            }
            const pct = Math.round((mastered / total) * 100);
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('statsText').innerText = `${mastered}/${total} 字熟練 (${pct}%)`;
        }

        function resetData() {
            if (confirm("確定要清空所有的答題紀錄與記憶曲線進度嗎？")) {
                localStorage.removeItem('cloze_quiz_progress_v1');
                initQuiz();
            }
        }

        window.onload = initQuiz;
